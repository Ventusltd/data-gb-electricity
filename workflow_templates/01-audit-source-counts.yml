name: 01 Audit GB electricity source counts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          path: data-gb-electricity

      - name: Checkout source monolith
        uses: actions/checkout@v4
        with:
          repository: Ventusltd/globalgrid2050
          path: globalgrid2050
          fetch-depth: 1

      - name: Show environment
        working-directory: data-gb-electricity
        run: |
          git --version
          python3 --version

      - name: Install Python dependencies
        working-directory: data-gb-electricity
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install duckdb pyarrow
          python3 -c "import duckdb, pyarrow; print('ok')"

      - name: Audit source counts only
        working-directory: data-gb-electricity
        run: |
          python3 pipelines/port_csv_to_parquet.py --source-root ../globalgrid2050
