name: 02 Build GB electricity Parquet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type BUILD_PARQUET to generate and commit Parquet outputs
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: ${{ inputs.confirm == 'BUILD_PARQUET' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          path: data-gb-electricity

      - name: Checkout source monolith
        uses: actions/checkout@v4
        with:
          repository: Ventusltd/globalgrid2050
          path: globalgrid2050
          fetch-depth: 1

      - name: Show environment
        working-directory: data-gb-electricity
        run: |
          git --version
          python3 --version

      - name: Install Python dependencies
        working-directory: data-gb-electricity
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install duckdb pyarrow
          python3 -c "import duckdb, pyarrow; print('ok')"

      - name: Build and verify Parquet
        working-directory: data-gb-electricity
        run: |
          python3 pipelines/port_csv_to_parquet.py --source-root ../globalgrid2050 --apply

      - name: Commit verified Parquet outputs
        working-directory: data-gb-electricity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add generation/ prices/ reports/latest_parquet_audit.json
          if git diff --cached --quiet; then
            echo "No Parquet changes to commit"
            exit 0
          fi
          git commit -m "data(gb-electricity): initial partitioned Parquet port"
          git push origin main
